<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>计算云™ - 专业计算结果查询平台</title>
  <meta name="description" content="全球领先的专业计算结果查询平台，已帮助数千名用户获取精准计算结果。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #0a0a0c; --bg-calc: #1c1c1e;
      --btn-num: #2e2e30; --btn-nhov: #3a3a3c;
      --btn-fn: #565658;  --btn-fnhov: #68686a;
      --btn-op: #ff9f0a;  --btn-ophov: #ffb340;
      --accent: #ff9f0a; --white: #fff; --dim: rgba(255,255,255,.5);
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --serif: 'Noto Serif SC', Georgia, serif;
      --ticker-h: 100px;
    }
    html { height: 100%; }
    body {
      font-family: var(--font); background: var(--bg); color: var(--white);
      min-height: 100%; display: flex; flex-direction: column; align-items: center;
      padding: 18px 0 calc(var(--ticker-h) + 10px) 0; overflow-x: hidden;
    }

    /* ── Header ── */
    .header { width: min(390px,100vw); padding: 0 20px 14px; user-select: none; }
    .brand-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px; }
    .brand-name { font-family: var(--serif); font-size: 22px; font-weight: 700; color: #fff; letter-spacing: 1px; }
    .brand-tm { font-size: 10px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
    .brand-line { height: 1px; background: linear-gradient(90deg,rgba(255,159,10,.6),rgba(255,159,10,.1),transparent); margin: 8px 0; }
    .stats-bar { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
    .stats-dot { width: 5px; height: 5px; border-radius: 50%; background: #30d158; flex-shrink: 0; animation: blink 2s infinite; }
    .stats-label { font-size: 11px; color: var(--dim); white-space: nowrap; }
    .stats-counter-wrap { display: flex; align-items: center; gap: 6px; flex: 1; }
    .stats-num { display: inline-flex; align-items: center; gap: 3px; }
    .digit-slot {
      width: 26px; height: 38px; overflow: hidden; border-radius: 7px;
      background: rgba(255,159,10,.1); border: 1px solid rgba(255,159,10,.28);
      box-shadow: 0 0 10px rgba(255,159,10,.12), inset 0 1px 0 rgba(255,255,255,.05);
      position: relative;
    }
    .digit-slot::before, .digit-slot::after {
      content: ''; position: absolute; left: 0; right: 0; height: 8px; z-index: 2; pointer-events: none;
    }
    .digit-slot::before { top: 0;    background: linear-gradient(to bottom, rgba(10,10,12,.9), transparent); }
    .digit-slot::after  { bottom: 0; background: linear-gradient(to top,   rgba(10,10,12,.9), transparent); }
    .digit-reel { display: flex; flex-direction: column; align-items: center; will-change: transform; }
    .digit-reel span {
      height: 38px; line-height: 38px; font-size: 24px; font-weight: 800;
      color: var(--accent); text-align: center; width: 26px; display: block;
      font-variant-numeric: tabular-nums; text-shadow: 0 0 14px rgba(255,159,10,.7);
    }
    .digit-sep { font-size: 20px; font-weight: 700; color: rgba(255,159,10,.5); line-height: 38px; margin: 0 1px; }
    .stats-unit { font-size: 11px; color: var(--dim); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    /* ── Calculator ── */
    .calc-shell {
      width: min(390px,100vw); background: var(--bg-calc); border-radius: 44px;
      box-shadow: 0 40px 80px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.04);
      padding: 14px 14px 26px;
    }
    .display { min-height: 120px; padding: 10px 22px 18px; display: flex; flex-direction: column; justify-content: flex-end; align-items: flex-end; gap: 2px; }
    .expr { font-size: 16px; color: var(--dim); font-weight: 300; min-height: 22px; text-align: right; word-break: break-all; }
    .main-num { font-size: clamp(44px,11vw,64px); font-weight: 300; line-height: 1.05; text-align: right; word-break: break-all; letter-spacing: -2px; transform-origin: center center;
      transition: color .25s, transform .55s cubic-bezier(.34,1.28,.64,1); }
    .main-num.flipped { transform: rotate(180deg); }
    .btn-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 11px; padding: 0 6px; }
    .btn {
      aspect-ratio: 1; border: none; border-radius: 50%;
      font-family: var(--font); font-size: clamp(17px,5vw,23px); font-weight: 400;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: transform .07s, opacity .07s; user-select: none;
      position: relative; overflow: hidden; -webkit-user-select: none;
    }
    .btn::after { content:''; position:absolute; inset:0; border-radius:inherit; background:#fff; opacity:0; transition:opacity .12s; }
    .btn:active::after { opacity:.18; } .btn:active { transform: scale(.9); }
    .n  { background: var(--btn-num); color: #fff; } .n:hover  { background: var(--btn-nhov); }
    .fn { background: var(--btn-fn);  color: #fff; font-size: clamp(13px,3.8vw,17px); } .fn:hover { background: var(--btn-fnhov); }
    .op { background: var(--btn-op);  color: #fff; font-size: clamp(19px,5.5vw,27px); } .op:hover { background: var(--btn-ophov); }
    .op.lit { background: #fff; color: var(--btn-op); }
    .zero { aspect-ratio: auto; border-radius: 40px; grid-column: span 2; justify-content: flex-start; padding-left: 28px; }
    .ripple { position:absolute; border-radius:50%; background:rgba(255,255,255,.22); transform:scale(0); animation:rpl .42s linear; pointer-events:none; }
    @keyframes rpl { to { transform:scale(2.6); opacity:0; } }

    /* ── Bottom action bar ── */
    .action-bar {
      width: min(390px,100vw); margin-top: 12px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .comment-toggle-btn {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.09);
      border-radius: 20px; padding: 8px 18px; cursor: pointer; transition: all .2s;
      font-family: var(--font); color: rgba(255,255,255,.6); font-size: 12px;
    }
    .comment-toggle-btn:hover { background: rgba(255,255,255,.08); color: rgba(255,255,255,.85); }
    .count-badge { background: var(--accent); color: #000; border-radius: 10px; font-size: 10px; font-weight: 700; padding: 1px 6px; }
    .nickname-btn {
      display: flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08);
      border-radius: 20px; padding: 7px 12px; cursor: pointer; transition: all .2s;
      font-family: var(--font); color: rgba(255,255,255,.45); font-size: 11px;
    }
    .nickname-btn:hover { background: rgba(255,255,255,.07); color: rgba(255,255,255,.75); }
    .nn-av  { font-size: 14px; }
    .nn-nm  { max-width: 60px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .nn-edit { font-size: 9px; color: rgba(255,255,255,.25); }

    /* ── Footer ── */
    .footer-tag { margin-top: 10px; margin-bottom: 4px; font-size: 9px; color: rgba(255,255,255,.12); text-align: center; letter-spacing: .3px; user-select: none; width: min(390px,100vw); padding: 0 20px; }

    /* ── Ticker ── */
    .ticker {
      position: fixed; bottom: 0; left: 0; right: 0; height: var(--ticker-h);
      background: rgba(12,12,14,.94); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid rgba(255,255,255,.07); overflow: hidden; z-index: 50;
    }
    .ticker-inner { height: 100%; display: flex; flex-direction: column; }
    .ticker-head { display: flex; align-items: center; gap: 5px; padding: 4px 14px 0; flex-shrink: 0; }
    .td { width:5px; height:5px; border-radius:50%; background:#30d158; animation:blink 2s infinite; flex-shrink:0; }
    .tl { font-size:9px; color:rgba(255,255,255,.22); letter-spacing:.5px; text-transform:uppercase; }
    .ticker-scroll-wrap {
      flex: 1; overflow: hidden;
      mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
      -webkit-mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
    }
    .ticker-track { display: flex; flex-direction: column; animation: scrollup 50s linear infinite; }
    @keyframes scrollup { 0%{transform:translateY(0)} 100%{transform:translateY(-50%)} }
    .ti { padding: 2px 14px; font-size: 11px; color: rgba(255,255,255,.38); line-height: 1.65; word-break: break-word; }
    .ti .tn  { color: rgba(255,255,255,.65); }
    .ti .te  { color: rgba(255,159,10,.65); font-family: monospace; }
    .ti .tl2 { color: rgba(100,210,255,.6); }
    .ti.real { color: rgba(255,255,255,.6); }
    .ti.real .tn { color: #64d2ff; }
    .ti.real::before { content: '📍 '; }

    /* ── Comment Panel ── */
    .comment-panel { position: fixed; inset: 0; z-index: 150; opacity: 0; pointer-events: none; transition: opacity .3s; }
    .comment-panel.show { opacity: 1; pointer-events: all; }
    .comment-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.6); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
    .comment-sheet {
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%);
      width: min(420px,100vw); max-height: 80vh;
      background: #18181b; border-radius: 20px 20px 0 0;
      border-top: 1px solid rgba(255,255,255,.08);
      display: flex; flex-direction: column;
      transition: transform .35s cubic-bezier(.32,1,.32,1);
      box-shadow: 0 -20px 60px rgba(0,0,0,.5);
    }
    .comment-panel.show .comment-sheet { transform: translateX(-50%) translateY(0); }
    .sheet-handle { width: 36px; height: 4px; background: rgba(255,255,255,.2); border-radius: 2px; margin: 10px auto 0; flex-shrink: 0; }
    .sheet-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px 8px; flex-shrink: 0; border-bottom: 1px solid rgba(255,255,255,.07); }
    .sheet-title { font-size: 14px; font-weight: 600; color: rgba(255,255,255,.85); }
    .sheet-close { background: none; border: none; color: rgba(255,255,255,.4); font-size: 18px; cursor: pointer; padding: 2px 6px; line-height: 1; }
    .comment-list { flex: 1; overflow-y: auto; padding: 10px 12px; display: flex; flex-direction: column; gap: 10px; }
    .comment-list::-webkit-scrollbar { width: 3px; }
    .comment-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }
    .c-card  { background: rgba(255,255,255,.04); border-radius: 12px; padding: 10px 12px; border: 1px solid rgba(255,255,255,.06); }
    .c-head  { display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px; }
    .c-avatar { font-size: 22px; line-height: 1; flex-shrink: 0; margin-top: 1px; }
    .c-meta  { flex: 1; min-width: 0; }
    .c-name-row { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
    .c-author { font-size: 12px; font-weight: 600; color: rgba(255,255,255,.78); }
    .c-time  { font-size: 9.5px; color: rgba(255,255,255,.22); flex-shrink: 0; }
    .c-location { font-size: 10px; color: rgba(255,255,255,.3); margin-top: 2px; letter-spacing: .2px; }
    .c-location .loc-pv { color: rgba(100,210,255,.55); font-weight: 500; }
    .c-text  { font-size: 13px; color: rgba(255,255,255,.82); line-height: 1.55; margin-bottom: 8px; }
    .c-actions { display: flex; align-items: center; gap: 12px; }
    .c-like, .c-reply-btn {
      display: flex; align-items: center; gap: 4px; font-size: 11px;
      color: rgba(255,255,255,.3); cursor: pointer; background: none; border: none;
      font-family: var(--font); transition: color .15s; padding: 0;
    }
    .c-like:hover, .c-reply-btn:hover { color: rgba(255,255,255,.7); }
    .c-replies { margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,.05); display: flex; flex-direction: column; gap: 8px; }
    .reply-card { background: rgba(255,255,255,.03); border-radius: 8px; padding: 8px 10px; }
    .reply-input-wrap { margin-top: 8px; display: none; }
    .reply-input-wrap.open { display: flex; gap: 6px; }
    .reply-input {
      flex: 1; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px; padding: 7px 10px; color: #fff; font-family: var(--font); font-size: 12px;
      outline: none; resize: none;
    }
    .reply-input::placeholder { color: rgba(255,255,255,.25); }
    .reply-send { background: var(--accent); border: none; border-radius: 10px; padding: 0 12px; color: #000; font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--font); white-space: nowrap; }
    .comment-input-bar { padding: 10px 12px 16px; border-top: 1px solid rgba(255,255,255,.07); flex-shrink: 0; display: flex; gap: 8px; align-items: flex-end; }
    .main-comment-input {
      flex: 1; background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1);
      border-radius: 14px; padding: 9px 12px; color: #fff; font-family: var(--font); font-size: 13px;
      outline: none; resize: none; max-height: 80px;
    }
    .main-comment-input::placeholder { color: rgba(255,255,255,.25); }
    .main-send-btn { background: var(--accent); border: none; border-radius: 12px; padding: 9px 14px; color: #000; font-size: 13px; font-weight: 700; cursor: pointer; font-family: var(--font); flex-shrink: 0; }

    /* ── Nickname Modal ── */
    .nn-overlay {
      position: fixed; inset: 0; z-index: 300;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,.6); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      opacity: 0; pointer-events: none; transition: opacity .25s;
    }
    .nn-overlay.show { opacity: 1; pointer-events: all; }
    .nn-card {
      background: #1e1e22; border: 1px solid rgba(255,255,255,.1); border-radius: 20px;
      padding: 20px 18px 18px; width: min(300px,88vw);
      transform: scale(.9) translateY(12px); transition: transform .3s cubic-bezier(.34,1.4,.64,1);
      box-shadow: 0 20px 60px rgba(0,0,0,.6);
    }
    .nn-overlay.show .nn-card { transform: scale(1) translateY(0); }
    .nn-title { font-size: 14px; font-weight: 600; color: rgba(255,255,255,.85); text-align: center; margin-bottom: 14px; }
    .nn-emoji-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 6px; margin-bottom: 14px; }
    .nn-emoji-opt {
      aspect-ratio: 1; border-radius: 10px; font-size: 20px; border: 2px solid transparent;
      background: rgba(255,255,255,.05); cursor: pointer; display: flex; align-items: center;
      justify-content: center; transition: all .15s;
    }
    .nn-emoji-opt:hover { background: rgba(255,255,255,.1); }
    .nn-emoji-opt.sel  { border-color: var(--accent); background: rgba(255,159,10,.12); }
    .nn-input {
      width: 100%; background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12);
      border-radius: 12px; padding: 9px 12px; color: #fff; font-family: var(--font); font-size: 13px;
      outline: none; margin-bottom: 10px;
    }
    .nn-input::placeholder { color: rgba(255,255,255,.22); }
    .nn-save { width: 100%; padding: 10px; background: var(--accent); border: none; border-radius: 12px; color: #000; font-size: 13px; font-weight: 700; cursor: pointer; font-family: var(--font); }
    .nn-hint { font-size: 10px; color: rgba(255,255,255,.2); text-align: center; margin-top: 8px; }

    /* ── Payment Overlay ── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.52);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; opacity: 0; pointer-events: none; transition: opacity .28s;
    }
    .overlay.show { opacity: 1; pointer-events: all; }
    .pay-card {
      background: rgba(28,28,31,.97); border: 1px solid rgba(255,255,255,.09); border-radius: 22px;
      width: min(260px,82vw); overflow: hidden;
      transform: scale(.9) translateY(16px); transition: transform .32s cubic-bezier(.34,1.46,.64,1);
      box-shadow: 0 20px 60px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.04);
    }
    .overlay.show .pay-card { transform: scale(1) translateY(0); }
    .pay-header { padding: 12px 16px 10px; text-align: center; border-bottom: 1px solid rgba(255,255,255,.07); }
    .pay-to   { font-size: 9.5px; color: rgba(255,255,255,.3); margin-bottom: 1px; }
    .pay-merchant { font-size: 13px; font-weight: 600; color: rgba(255,255,255,.88); }
    .pay-amount-row {
      padding: 8px 16px 7px; text-align: center;
      border-bottom: 1px solid rgba(255,255,255,.07);
      display: flex; align-items: baseline; justify-content: center; gap: 4px;
    }
    .pay-amount-label { font-size: 9.5px; color: rgba(255,255,255,.28); }
    .pay-amount { font-size: 28px; font-weight: 700; color: #fff; letter-spacing: -1px; }
    .pay-amount span { font-size: 15px; font-weight: 500; margin-right: 1px; }
    .pay-qr-section { padding: 10px 14px 6px; display: flex; flex-direction: column; align-items: center; }
    .pay-expr { font-size: 10.5px; color: rgba(255,255,255,.28); background: rgba(255,255,255,.05); border-radius: 6px; padding: 3px 9px; margin-bottom: 8px; font-family: monospace; word-break: break-all; text-align: center; max-width: 100%; }
    #qr-canvas-wrap { padding: 7px; background: #fff; border-radius: 9px; display: inline-block; margin-bottom: 6px; }
    .pay-hint { font-size: 11px; color: rgba(255,255,255,.6); font-weight: 500; margin-bottom: 1px; }
    .pay-sub  { font-size: 9px; color: rgba(255,255,255,.2); text-align: center; line-height: 1.5; margin-bottom: 8px; }
    .pay-actions { display: flex; border-top: 1px solid rgba(255,255,255,.07); }
    .pay-btn { flex:1; padding:11px; border:none; background:transparent; font-family:var(--font); font-size:13px; cursor:pointer; transition:background .15s; color:rgba(255,255,255,.45); }
    .pay-btn:hover { background: rgba(255,255,255,.05); }
    .pay-btn.cancel  { border-right: 1px solid rgba(255,255,255,.07); }
    .pay-btn.confirm { color: rgba(100,210,255,.85); font-weight: 600; }
    /* Funny message */
    .funny-msg { padding: 12px 14px 8px; text-align: center; display: none; }
    .funny-msg.show { display: block; }
    .funny-icon  { font-size: 34px; margin-bottom: 6px; display: block; animation: pop .4s cubic-bezier(.34,1.56,.64,1); }
    .funny-title { font-size: 14px; font-weight: 700; color: rgba(255,255,255,.9); margin-bottom: 4px; }
    .funny-desc  { font-size: 11px; color: rgba(255,255,255,.4); line-height: 1.5; }
    @keyframes pop { from{transform:scale(0)} to{transform:scale(1)} }
    /* Spinner */
    .verify-spinner { padding: 16px; text-align: center; display: none; }
    .verify-spinner.show { display: block; }
    .spinner-ring { width:26px; height:26px; border:3px solid rgba(255,255,255,.1); border-top-color:rgba(100,210,255,.7); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 7px; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .verify-text { font-size: 11px; color: rgba(255,255,255,.4); }

    @media (min-width:600px) { body{padding-top:32px} .calc-shell{border-radius:52px} .btn-grid{gap:13px} }
    @media (max-width:375px) { .calc-shell{border-radius:34px;padding:10px 10px 22px} .btn-grid{gap:8px;padding:0 2px} .display{min-height:100px;padding:8px 16px 14px} }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="brand-row">
      <span class="brand-name">计算云</span>
      <span class="brand-tm">™ · Professional</span>
    </div>
    <div class="brand-line"></div>
    <div class="stats-bar">
      <div class="stats-dot"></div>
      <span class="stats-label">已服务</span>
      <div class="stats-counter-wrap">
        <span class="stats-num" id="stats-num"></span>
        <span class="stats-unit">位用户完成精准计算</span>
      </div>
    </div>
  </div>

  <!-- Calculator -->
  <div class="calc-shell">
    <div class="display">
      <div class="expr" id="expr"></div>
      <div class="main-num" id="main-num">0</div>
    </div>
    <div class="btn-grid">
      <button class="btn fn" data-a="clear" id="btn-ac">AC</button>
      <button class="btn fn" data-a="sign">+/−</button>
      <button class="btn fn" data-a="pct">%</button>
      <button class="btn op" data-a="op" data-op="÷">÷</button>
      <button class="btn n" data-a="d" data-d="7">7</button>
      <button class="btn n" data-a="d" data-d="8">8</button>
      <button class="btn n" data-a="d" data-d="9">9</button>
      <button class="btn op" data-a="op" data-op="×">×</button>
      <button class="btn n" data-a="d" data-d="4">4</button>
      <button class="btn n" data-a="d" data-d="5">5</button>
      <button class="btn n" data-a="d" data-d="6">6</button>

  var UserInfo = (function() {
    var ua = navigator.userAgent;
    var device = '某神秘设备', browser = '某浏览器', network = '';

    if      (/iPhone/.test(ua))    { var v=ua.match(/iPhone OS (\d+)/);  device='iPhone · iOS'+(v?' '+v[1]:''); }
    else if (/iPad/.test(ua))       { device='iPad'; }
    else if (/Android/.test(ua))   { var v=ua.match(/Android (\d+)/), m=ua.match(/;\s*([A-Za-z0-9 _\-]+)\sBuild/); device=(m&&m[1].trim().length<22)?m[1].trim():'Android '+(v?v[1]:'')+'手机'; }
    else if (/Macintosh/.test(ua)) { device='MacBook'; }
    else if (/Windows/.test(ua))   { device='Windows电脑'; }

    if      (/CriOS/.test(ua))      browser='Chrome';
    else if (/Edg\//.test(ua))      browser='Edge';
    else if (/Chrome/.test(ua))     browser='Chrome';
    else if (/Firefox/.test(ua))    browser='Firefox';
    else if (/Safari/.test(ua))     browser='Safari';

    var conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
    if (conn) {
      var t = conn.effectiveType || conn.type;
      if      (t==='4g')                   network='4G';
      else if (t==='3g')                   network='3G';
      else if (t==='wifi'||t==='ethernet') network='WiFi';
      else if (t)                          network=t.toUpperCase();
    }

    return { device:device, browser:browser, network:network,
             screen:screen.width+'×'+screen.height,
             province:'', city:'', isp:'', ip:'' };
  })();

  function normalizeISP(isp) {
    if (!isp) return '';
    if (/Mobile|移动/.test(isp))  return '中国移动';
    if (/Telecom|电信/.test(isp)) return '中国电信';
    if (/Unicom|联通/.test(isp))  return '中国联通';
    if (/Broadband/.test(isp))    return '宽带';
    return isp.length > 12 ? isp.slice(0,12) : isp;
  }

  // Fetch IP geolocation (free, no key, ~45 req/min limit)
  fetch('https://ip-api.com/json/?fields=status,regionName,city,isp,mobile,query&lang=zh-CN')
    .then(function(r){ return r.json(); })
    .then(function(d) {
      if (d.status === 'success') {
        UserInfo.province = d.regionName ? d.regionName.replace('省','').replace('市','').replace('自治区','').replace('特别行政区','') : '';
        UserInfo.city     = d.city ? d.city.replace('市','') : '';
        UserInfo.isp      = normalizeISP(d.isp);
        UserInfo.ip       = d.query || '';
        var loc  = [UserInfo.province, UserInfo.city].filter(Boolean).join(' · ');

  function myDesc() {
    var loc = [UserInfo.province, UserInfo.city].filter(Boolean).join(' ');

  // ═══════════════════════════════════════
  // 1. SLOT MACHINE COUNTER
  // ═══════════════════════════════════════
  (function() {
    var LAUNCH = new Date('2026-01-10T08:00:00+08:00');
    var BASE = 2631, DAILY = 13, HOURLY = 0.52, MIN_INC = 0.008;
    var DIGIT_H = 38, CYCLES = 5;

    function getCount() {
      var ms = new Date() - LAUNCH;
      return ms < 0 ? BASE : Math.floor(BASE + (ms/60000)*(DAILY/1440+HOURLY/60+MIN_INC));
    }

    function buildSlot(ch) {
      var target = parseInt(ch);
      var slot = document.createElement('div'); slot.className = 'digit-slot';
      var reel = document.createElement('div'); reel.className = 'digit-reel';
      for (var c = 0; c < CYCLES; c++) {
        for (var d = 0; d < 10; d++) {
          var sp = document.createElement('span'); sp.textContent = d; reel.appendChild(sp);
        }
      }
      for (var d = 0; d <= target; d++) {
        var sp = document.createElement('span'); sp.textContent = d; reel.appendChild(sp);
      }
      slot.appendChild(reel);
      return { slot:slot, reel:reel };
    }

    function run(target) {
      var container = document.getElementById('stats-num');
      container.innerHTML = '';
      var formatted = target.toLocaleString('zh-CN');
      var slots = [];
      Array.from(formatted).forEach(function(ch) {
        if (ch === ',' || ch === '\u202f') {
          var sep = document.createElement('span'); sep.className = 'digit-sep'; sep.textContent = ','; container.appendChild(sep);
        } else {
          var r = buildSlot(ch); slots.push({reel:r.reel, digit:parseInt(ch)}); container.appendChild(r.slot);
        }
      });
      var n = slots.length;
      slots.forEach(function(s, i) {
        var finalPos = (CYCLES*10 + s.digit) * DIGIT_H;
        var stopDelay = (n-1-i)*420 + 300;
        var spinDur   = 550 + (n-1-i)*180;
        var f = 0;
        var iv = setInterval(function(){ f=(f+3)%10; s.reel.style.transform='translateY(-'+(f*DIGIT_H)+'px)'; }, 40);
        setTimeout(function() {
          clearInterval(iv);
          s.reel.style.transition = 'transform '+spinDur+'ms cubic-bezier(.12,.8,.32,1)';
          s.reel.style.transform  = 'translateY(-'+finalPos+'px)';
          setTimeout(function() {
            var sl = s.reel.parentElement;
            sl.style.boxShadow='0 0 18px rgba(255,159,10,.55),inset 0 0 8px rgba(255,159,10,.15)';
            sl.style.borderColor='rgba(255,159,10,.6)';
            sl.style.transition='box-shadow .3s,border-color .3s';
            setTimeout(function(){ sl.style.boxShadow=''; sl.style.borderColor=''; }, 600);
          }, spinDur);
        }, stopDelay);
      });
    }
    run(getCount());
  })();

  // ═══════════════════════════════════════
  // 2. CALCULATOR LOGIC
  // ═══════════════════════════════════════
  var cur='0', prev='', op=null, waitOp=false, justCalc=false, litBtn=null;
  var numEl = document.getElementById('main-num');
  var exprEl = document.getElementById('expr');

  function setDisplay(v) {
    var s = String(v);
    if (s.length > 12) { var n=parseFloat(s); if(!isNaN(n)){s=n.toPrecision(8).replace(/\.?0+$/,''); if(s.length>12)s=n.toExponential(4);} }
    numEl.textContent = s; numEl.style.color = '';
  }
  function flipResult() {
    numEl.classList.add('flipped');
  }
  function unflipResult() {
    numEl.classList.remove('flipped');
    numEl.style.filter = ''; numEl.style.color = ''; numEl.style.textShadow = ''; numEl.style.transition = '';
    setDisplay(cur);
  }
  function clearLit() { if (litBtn){litBtn.classList.remove('lit'); litBtn=null;} }
  function setLit(b)  { clearLit(); if(b){b.classList.add('lit'); litBtn=b;} }
  function calc(a,b,o) {
    if(o==='+') return a+b; if(o==='−') return a-b; if(o==='×') return a*b;
    if(o==='÷') return b!==0?a/b:'Error'; return b;
  }
  function onDigit(d) {
    if(justCalc){cur=d;exprEl.textContent='';justCalc=false;clearLit();unflipResult();}
    else if(waitOp){cur=d;waitOp=false;}
    else{cur=cur==='0'?d:cur+d; if(cur.length>15)return;}
    setDisplay(cur); document.getElementById('btn-ac').textContent='C';
  }
  function onDot() {
    if(justCalc){cur='0.';justCalc=false;clearLit();}
    else if(waitOp){cur='0.';waitOp=false;}
    else if(!cur.includes('.'))cur+='.';
    setDisplay(cur);
  }
  function onOp(o,btn) {
    if(op&&!waitOp){var r=calc(parseFloat(prev),parseFloat(cur),op);cur=String(r);prev=cur;exprEl.textContent=cur+' '+o;}
    else{prev=cur;exprEl.textContent=cur+' '+o;}
    op=o;waitOp=true;justCalc=false;setDisplay(cur);setLit(btn);
  }
  function onEq() {
    if(!op) return;
    var a=parseFloat(prev), b=parseFloat(cur);
    var fullExpr=prev+' '+op+' '+cur;
    var r=calc(a,b,op);
    exprEl.textContent=fullExpr+' =';
    cur=String(parseFloat(r.toFixed(10))); op=null; waitOp=false; justCalc=true; clearLit();
    showPayment(fullExpr);
    addRealTick('<span class="tn">'+UserInfo.device+'</span> 刚刚查询了 <span class="te">'+fullExpr+'</span>', true);
  }
  function onClear() {
    cur='0';prev='';op=null;waitOp=false;justCalc=false;
    exprEl.textContent='';setDisplay('0');clearLit();unflipResult();
    document.getElementById('btn-ac').textContent='AC';
  }
  function onSign() { if(cur==='0'||cur==='Error')return; cur=cur.startsWith('-')?cur.slice(1):'-'+cur; setDisplay(cur); }
  function onPct()  { var v=parseFloat(cur); if(isNaN(v))return; cur=String(v/100); setDisplay(cur); }

  document.querySelectorAll('.btn').forEach(function(b) {
    b.addEventListener('click', function(e) {
      ripple(b,e);
      var a=b.dataset.a;
      if      (a==='d')     onDigit(b.dataset.d);
      else if (a==='dot')   onDot();
      else if (a==='op')    onOp(b.dataset.op, b);
      else if (a==='eq')    onEq();
      else if (a==='clear') onClear();
      else if (a==='sign')  onSign();
      else if (a==='pct')   onPct();
    });
  });
  document.addEventListener('keydown', function(e) {
    if      (e.key>='0'&&e.key<='9')          onDigit(e.key);
    else if (e.key==='.')                       onDot();
    else if (e.key==='+')                       onOp('+',null);
    else if (e.key==='-')                       onOp('−',null);
    else if (e.key==='*')                       onOp('×',null);
    else if (e.key==='/'){e.preventDefault();   onOp('÷',null);}
    else if (e.key==='Enter'||e.key==='=')      onEq();
    else if (e.key==='Backspace')              {cur=cur.length>1?cur.slice(0,-1):'0';setDisplay(cur);}
    else if (e.key==='Escape')                  onClear();
  });
  function ripple(btn,e) {
    var r=document.createElement('span'); r.className='ripple';
    var sz=Math.max(btn.clientWidth,btn.clientHeight), rc=btn.getBoundingClientRect();
    r.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+((e.clientX||rc.left+rc.width/2)-rc.left-sz/2)+'px;top:'+((e.clientY||rc.top+rc.height/2)-rc.top-sz/2)+'px';
    btn.appendChild(r); r.addEventListener('animationend',function(){r.remove();});
  }

    return JSON.parse(JSON.stringify(SEED));
  }
  function saveComments(data) { try{localStorage.setItem('calcpro_comments',JSON.stringify(data));}catch(e){} }
  function getMyAvatar() {
    var av=localStorage.getItem('my_avatar');
    if(!av){av=COM_AVATARS[Math.floor(Math.random()*COM_AVATARS.length)];localStorage.setItem('my_avatar',av);}
    return av;
  }
  function timeAgo(ts) {
    var d=Date.now()-ts, m=Math.floor(d/60000), h=Math.floor(m/60), day=Math.floor(h/24);
    if(m<1)return '刚刚'; if(m<60)return m+'分钟前'; if(h<24)return h+'小时前'; return day+'天前';
  }

  function renderCommentCard(c, isReply) {
    isReply = isReply || false;
    var cls = isReply ? 'reply-card' : 'c-card';
    var repliesHtml = (!isReply && c.replies && c.replies.length)
      ? '<div class="c-replies">' + c.replies.map(function(r){return renderCommentCard(r,true);}).join('') + '</div>' : '';
    var replyBtn = !isReply
      ? '<button class="c-reply-btn" onclick="toggleReplyInput(\''+c.id+'\')">💬 回复</button>' : '';
    var replyInput = !isReply
      ? '<div class="reply-input-wrap" id="ri-'+c.id+'">'
        + '<textarea class="reply-input" id="rit-'+c.id+'" placeholder="回复…" rows="1"></textarea>'
        + '<button class="reply-send" onclick="submitReply(\''+c.id+'\')">发送</button>'
        + '</div>' : '';
    var displayName = c.name || c.device || '匿名';
    var pvHtml = c.province ? '<span class="loc-pv">'+c.province+'</span> · ' : '';
    var locLine = (c.province || c.device)
      ? '<div class="c-location">'+pvHtml+(c.device||'')+'</div>' : '';
    return '<div class="'+cls+'" id="c-'+c.id+'">'
      + '<div class="c-head">'
      + '<div class="c-avatar">'+c.author+'</div>'
      + '<div class="c-meta">'
      + '<div class="c-name-row"><span class="c-author">'+displayName+'</span><span class="c-time">'+timeAgo(c.time)+'</span></div>'
      + locLine
      + '</div>'
      + '</div>'
      + '<div class="c-text">'+c.text+'</div>'
      + '<div class="c-actions">'
      + '<button class="c-like" id="like-'+c.id+'" onclick="toggleLike(\''+c.id+'\')">❤ '+c.likes+'</button>'
      + replyBtn
      + '</div>'
      + repliesHtml
      + replyInput
      + '</div>';
  }

  function renderComments() {
    var data = loadComments();
    document.getElementById('comment-list').innerHTML = data.map(function(c){return renderCommentCard(c);}).join('');
    var total = data.reduce(function(s,c){return s+1+(c.replies||[]).length;}, 0);
    document.getElementById('comment-count').textContent = total;
    document.getElementById('sheet-count').textContent = total + ' 条神评';
  }
  function toggleReplyInput(id) {
    var wrap=document.getElementById('ri-'+id);
    var open=wrap.classList.toggle('open');
    if(open) document.getElementById('rit-'+id).focus();
  }
  function toggleLike(id) {
    var data=loadComments(), key='liked_'+id, liked=localStorage.getItem(key);
    function find(list,id){for(var i=0;i<list.length;i++){if(list[i].id===id)return list[i];if(list[i].replies){var r=find(list[i].replies,id);if(r)return r;}}return null;}
    var c=find(data,id); if(!c)return;
    if(liked){c.likes=Math.max(0,c.likes-1);localStorage.removeItem(key);}
    else{c.likes++;localStorage.setItem(key,'1');}
    saveComments(data); renderComments();
  }
  function submitComment() {
    var inp=document.getElementById('main-input'), text=inp.value.trim();
    if(!text)return;
    var data=loadComments();
    data.unshift({id:'u'+Date.now(), text:text, author:getMyAvatar(),
      name: localStorage.getItem('my_nickname')||'匿名',
      province: UserInfo.province||'',
      device: UserInfo.device,
      time:Date.now(), likes:0, replies:[]});
    saveComments(data); inp.value=''; inp.style.height='auto';
    renderComments(); document.getElementById('comment-list').scrollTop=0;
  }
  function submitReply(parentId) {
    var inp=document.getElementById('rit-'+parentId), text=inp.value.trim();
    if(!text)return;
    var data=loadComments(), parent=data.find(function(c){return c.id===parentId;});
    if(!parent)return;
    parent.replies.push({id:'r'+Date.now(), text:text, author:getMyAvatar(),
      name: localStorage.getItem('my_nickname')||'匿名',
      province: UserInfo.province||'',
      device: UserInfo.device,
      time:Date.now(), likes:0});
    saveComments(data); inp.value=''; renderComments();
  }
  function openComments()  { document.getElementById('comment-panel').classList.add('show'); renderComments(); }
  function closeComments() { document.getElementById('comment-panel').classList.remove('show'); }

  var mainInp = document.getElementById('main-input');
  if (mainInp) mainInp.addEventListener('input', function(){ this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,80)+'px'; });

  setTimeout(function(){
    var d=loadComments(), t=d.reduce(function(s,c){return s+1+(c.replies||[]).length;},0);
    document.getElementById('comment-count').textContent=t;
  }, 100);

  // ═══════════════════════════════════════
  // 5. TICKER
  // ═══════════════════════════════════════
  var FN=['张','李','王','赵','陈','刘','杨','黄','周','吴','郑','孙','徐','朱','马','胡','林','郭','何','高','梁','钱','冯','韩','许','邓','萧'];
  var LN=['伟','芳','娜','秀英','敏','静','丽','强','磊','洋','艳','勇','军','杰','娟','涛','明','超','霞','平','帅','萌'];
  var OPS=['+','−','×','÷'];
  var PROVINCES=['广东','北京','上海','浙江','江苏','四川','湖南','湖北','陕西','山东','河南','福建','重庆','云南','安徽','天津','辽宁','黑龙江','吉林','内蒙古','新疆'];
  var ISPS=['中国移动','中国电信','中国联通','中国广电'];
  var DEVICES=['iPhone 15 Pro','iPhone 14','iPhone 13','小米14','小米13','华为Mate60','华为P60','OPPO Find X7','vivo X100','三星S24','Redmi K70'];

  function rname()     { var f=FN[~~(Math.random()*FN.length)],l=LN[~~(Math.random()*LN.length)],s=f+l; return s.length>=3?s[0]+'*'.repeat(s.length-2)+s[s.length-1]:s[0]+'*'; }
  function rtime()     { var m=~~(Math.random()*58)+1; return m<60?m+'分钟前':~~(m/60)+'小时前'; }
  function rexpr()     { return (~~(Math.random()*9999)+1)+' '+OPS[~~(Math.random()*4)]+' '+(~~(Math.random()*9999)+1); }
  function rprovince() { return PROVINCES[~~(Math.random()*PROVINCES.length)]; }
  function risp()      { return ISPS[~~(Math.random()*ISPS.length)]; }
  function rdevice()   { return DEVICES[~~(Math.random()*DEVICES.length)]; }
  function rnet()      { return ['4G','5G','WiFi'][~~(Math.random()*3)]; }

  var FAKE_T = [
    function(n,e,t,pv,isp,dv,net){ return '<span class="tn">'+n+'</span> · <span class="tl2">'+pv+'</span> · '+dv+' '+t+'查 <span class="te">'+e+'</span>，默默关掉了'; },
    function(n,e,t,pv,isp,dv,net){ return '<span class="tn">'+n+'</span> · <span class="tl2">'+pv+'</span> · '+dv+' 声称已付款 🤨 系统存疑'; },
    function(n,e,t,pv,isp,dv,net){ return '<span class="tn">'+n+'</span> · <span class="tl2">'+pv+'</span> · '+dv+' 查 <span class="te">'+e+'</span>，这次真的会付（上次也这么说）'; },
    function(n,e,t,pv,isp,dv,net){ return '<span class="tn">'+n+'</span> · <span class="tl2">'+pv+'</span> · '+dv+' '+t+'在弹窗停留0.8秒，破本周最短纪录'; },
    function(n,e,t,pv,isp,dv,net){ return '<span class="tn">'+n+'</span> · <span class="tl2">'+pv+'</span> · '+dv+' 把¥1.99投进了存钱罐，说下次再用'; },
    function(n,e,t,pv,isp,dv,net){ return '<span class="tn">'+n+'</span> · <span class="tl2">'+pv+'</span> · '+dv+' 查 <span class="te">'+e+'</span>，结果见了也没带走'; },
    function(n,e,t,pv,isp,dv,net){ return '<span class="tn">'+n+'</span> · <span class="tl2">'+pv+'</span> · '+dv+' 试图用道德说服系统免费给答案，失败'; },
    function(n,e,t,pv,isp,dv,net){ return '<span class="tn">'+n+'</span> · <span class="tl2">'+pv+'</span> · '+dv+' '+t+'查 <span class="te">'+e+'</span>，表示回去凑钱'; },
  ];

  var tickerData = [];
  for (var i = 0; i < 28; i++) {
    var n=rname(),e=rexpr(),t=rtime(),pv=rprovince(),isp=risp(),dv=rdevice(),net=rnet();
    tickerData.push({html: FAKE_T[~~(Math.random()*FAKE_T.length)](n,e,t,pv,isp,dv,net), real:false});
  }

  function addRealTick(html, real) {
    tickerData.unshift({html:html, real:!!real});
    if (tickerData.length > 50) tickerData.pop();
    renderTicker();
  }
  function renderTicker() {
    var doubled = tickerData.concat(tickerData);
    document.getElementById('ticker-track').innerHTML = doubled.map(function(x){
      return '<div class="ti'+(x.real?' real':'')+'">'+x.html+'</div>';
    }).join('');
  }

  renderTicker();
  setInterval(function() {
    var n=rname(),e=rexpr(),t=rtime(),pv=rprovince(),isp=risp(),dv=rdevice(),net=rnet();
    tickerData.push({html:FAKE_T[~~(Math.random()*FAKE_T.length)](n,e,t,pv,isp,dv,net),real:false});
    if(tickerData.length>50)tickerData.shift();
    renderTicker();
  }, 9000);

  setTimeout(function(){
    addRealTick('<span class="tn">'+UserInfo.device+'</span> · '+UserInfo.browser+(UserInfo.network?' · '+UserInfo.network:'')+' 刚刚打开了计算云™', true);
  }, 200);

  // ═══════════════════════════════════════
  // 6. NICKNAME SYSTEM
  // ═══════════════════════════════════════
  var ALL_AVATARS = ['🎭','🐼','🦊','🐸','🦉','🎪','🐯','🦋','🎨','🌊','🎸','🚀','🌈','🍉','🦄','🎃','🌸','🦈','🐉','🍀'];

  function getNickname() { return localStorage.getItem('my_nickname')||''; }
  function getAvatar()   { return localStorage.getItem('my_avatar')||ALL_AVATARS[0]; }

  function updateNicknameDisplay() {
    var nm=getNickname(), av=getAvatar();
    document.getElementById('my-av-disp').textContent = av;
    document.getElementById('my-nm-disp').textContent = nm||'匿名';
  }
  function openNickname() {
    var ol=document.getElementById('nn-overlay');
    var grid=document.getElementById('nn-emoji-grid');
    var inp=document.getElementById('nn-input');
    var curAv=getAvatar();
    grid.innerHTML = ALL_AVATARS.map(function(em){
      return '<button class="nn-emoji-opt'+(em===curAv?' sel':'')+'" onclick="selectAvatar(\''+em+'\',this)">'+em+'</button>';
    }).join('');
    inp.value = getNickname();
    ol.classList.add('show');
    setTimeout(function(){inp.focus();}, 350);
  }
  function closeNickname() { document.getElementById('nn-overlay').classList.remove('show'); }
  function selectAvatar(em, btn) {
    document.querySelectorAll('.nn-emoji-opt').forEach(function(b){b.classList.remove('sel');});
    btn.classList.add('sel');
  }
  function saveNickname() {
    var sel=document.querySelector('.nn-emoji-opt.sel');
    var av=sel?sel.textContent:getAvatar();
    var nm=document.getElementById('nn-input').value.trim();
    localStorage.setItem('my_avatar',av);
    if(nm) localStorage.setItem('my_nickname',nm);
    else   localStorage.removeItem('my_nickname');
    updateNicknameDisplay();
    closeNickname();
  }
  document.getElementById('nn-overlay').addEventListener('click', function(e){
    if(e.target===document.getElementById('nn-overlay')) closeNickname();
  });
  updateNicknameDisplay();
  </script>
</body>
</html>
